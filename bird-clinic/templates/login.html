<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود — سامانه دامپزشکی</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">🦚</div>
            <h1 class="login-title">سامانه دامپزشکی</h1>
            <p class="login-subtitle">باغ پرندگان زینتی تهران</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}" style="margin-bottom:16px;">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" class="login-form">
                <div class="form-group">
                    <label>نام کاربری</label>
                    <input type="text" name="username" class="form-input" placeholder="نام کاربری خود را وارد کنید" required autofocus>
                </div>
                <div class="form-group">
                    <label>رمز عبور</label>
                    <input type="password" name="password" class="form-input" placeholder="رمز عبور" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">ورود به سامانه</button>
            </form>
        </div>
        <div class="login-footer">ساخته شده توسط دکتر مهدیار رمزگویان</div>
    </div>
</body>
</html>
